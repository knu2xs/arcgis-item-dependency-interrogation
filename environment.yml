name: arcgis_dependency

channels:
  - conda-forge
  - esri
  - defaults

dependencies:
  - appnope
  - arcgis
  - black>=21
  - jupyterlab
  - jupyterlab_code_formatter
  - nodejs
  - pip
  - pytest
  - python>=3.12
  - pyyaml
  - tqdm
  - pip:
    - bump2version
    - mkdocs
    - mkdocs-glightbox
    - mkdocs-include-markdown-plugin
    - mkdocs-jupyter
    - mkdocs-material
    - mkdocstrings[python]>=0.18
